apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googleclothes:b11dcb7fdad34a4a0888fd6cd8f5d6cbe0ff3fc6
        ports:
        - containerPort: 80
