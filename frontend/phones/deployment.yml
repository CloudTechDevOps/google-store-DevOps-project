  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-phones:b742447c17f96e8d220e0ab19085bf236e929a93
        ports:
        - containerPort: 80
