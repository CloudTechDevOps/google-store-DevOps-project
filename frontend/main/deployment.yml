apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-main:b11dcb7fdad34a4a0888fd6cd8f5d6cbe0ff3fc6
        ports:
        - containerPort: 80

