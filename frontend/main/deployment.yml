apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-main:3064b5511dfbd96f74ec50fc42889632844dfa28
        ports:
        - containerPort: 80

