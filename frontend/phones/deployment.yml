apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-phones:b11dcb7fdad34a4a0888fd6cd8f5d6cbe0ff3fc6
        ports:
        - containerPort: 80
