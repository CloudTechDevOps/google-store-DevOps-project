apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:606ebd7d22f59f50b4a352bf54ef2f79f234f288
        ports:
        - containerPort: 80
