  name: electronics-deployment
  labels:
    app: electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electronics
  template:
    metadata:
      labels:
        app: electronics
    spec:
      containers:
      - name: electronics
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-electronics:3064b5511dfbd96f74ec50fc42889632844dfa28
        ports:
        - containerPort: 80
