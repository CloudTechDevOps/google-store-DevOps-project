apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-backend:b11dcb7fdad34a4a0888fd6cd8f5d6cbe0ff3fc6
          ports:
            - containerPort: 5000
