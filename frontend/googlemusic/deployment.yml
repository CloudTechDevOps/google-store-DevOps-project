apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googlemusic:3064b5511dfbd96f74ec50fc42889632844dfa28
        ports:
        - containerPort: 80
