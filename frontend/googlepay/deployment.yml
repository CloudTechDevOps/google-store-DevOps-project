apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:606ebd7d22f59f50b4a352bf54ef2f79f234f288
        ports:
        - containerPort: 80
