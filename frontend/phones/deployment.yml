apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:606ebd7d22f59f50b4a352bf54ef2f79f234f288
        ports:
        - containerPort: 80
