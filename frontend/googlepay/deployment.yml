apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-googlepay:b11dcb7fdad34a4a0888fd6cd8f5d6cbe0ff3fc6
        ports:
        - containerPort: 80
