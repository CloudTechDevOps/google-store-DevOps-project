apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-backend:b742447c17f96e8d220e0ab19085bf236e929a93
          ports:
            - containerPort: 5000
