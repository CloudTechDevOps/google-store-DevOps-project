apiVersion: apps/v1
kind: Deployment
metadata:
  name: earphones-deployment
  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 905418310012.dkr.ecr.us-west-2.amazonaws.com/shopping-site-earphones:3064b5511dfbd96f74ec50fc42889632844dfa28
        ports:
        - containerPort: 80
